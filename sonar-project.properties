sonar.organization=bami-flogert
sonar.projectKey=bami-flogert_openmrs-module-htmlformentry
sonar.host.url=https://sonarcloud.io

# Multi-module Maven (35k nLines baseline)
sonar.sources=api,api-1.9,api-1.10,api-2.0,api-2.2,omod
sonar.tests=api-tests,omod
sonar.java.binaries=**/target/classes
sonar.exclusions=**/target/**,**/*.min.js

# JaCoCo uit PoC-testscope (zelfde als ci.yml unit-test job)
sonar.coverage.jacoco.xmlReportPaths=omod/target/site/jacoco/jacoco.xml
