name: CI

on:
  pull_request:
    branches:
      - development
      - pre-release
      - acceptatie
      - main
  push:
    branches:
      - main

permissions:
  contents: read
  pull-requests: read

env:
  TZ: America/New_York

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Set up JDK 8
        uses: actions/setup-java@v5.3.0
        with:
          java-version: '8'
          distribution: 'temurin'
          cache: maven

      - name: Build OMOD
        run: mvn -B package --file pom.xml -DskipTests

  unit-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Set up JDK 8
        uses: actions/setup-java@v5.3.0
        with:
          java-version: '8'
          distribution: 'temurin'
          cache: maven

      - name: Run PoC-scope unit tests
        run: mvn -B -pl omod -am test verify --file pom.xml

      - name: Upload JaCoCo report
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: jacoco-report-pr-${{ github.event.pull_request.number }}
          path: omod/target/site/jacoco/
          if-no-files-found: ignore
          retention-days: 14

  dependency-review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/dependency-review-action@v5

  zizmor:
    name: zizmor (GitHub Actions security)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false

      # continue-on-error: baseline has open findings; remove after remediation (see docs/zizmor.md)
      - name: Run zizmor
        uses: zizmorcore/zizmor-action@192e21d79ab29983730a13d1382995c2307fbcaa # v0.5.7
        with:
          advanced-security: false
          annotations: true
        continue-on-error: true

  sonarcloud:
    name: SonarCloud Analysis
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set up JDK 8
        uses: actions/setup-java@v5.3.0
        with:
          java-version: '8'
          distribution: 'temurin'
          cache: maven

      - name: Cache SonarCloud packages
        uses: actions/cache@v5.0.5
        with:
          path: ~/.sonar/cache
          key: ${{ runner.os }}-sonar
          restore-keys: ${{ runner.os }}-sonar

      - name: Build and run PoC-scope tests
        run: |
          mvn -B package --file pom.xml -DskipTests
          mvn -B -pl api,api-tests,omod -am test verify --file pom.xml

      - name: Verify JaCoCo reports exist
        run: |
          for f in omod/target/site/jacoco/jacoco.xml \
                   api/target/site/jacoco/jacoco.xml; do
            if [ ! -f "$f" ]; then
              echo "::error::Missing $f"
              exit 1
            fi
            echo "OK: $f"
          done
          echo "Note: api-tests has no src/main; JaCoCo report is not generated there (tests cover api/omod code)."

      - name: Set up JDK 17 for SonarScanner
        uses: actions/setup-java@v5.3.0
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: SonarCloud scan
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          EVENT_NAME: ${{ github.event_name }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_BRANCH: ${{ github.head_ref }}
          PR_BASE: ${{ github.base_ref }}
        run: |
          PR_ARGS=""
          if [ "$EVENT_NAME" = "pull_request" ]; then
            PR_ARGS="-Dsonar.pullrequest.key=${PR_NUMBER} \
              -Dsonar.pullrequest.branch=${PR_BRANCH} \
              -Dsonar.pullrequest.base=${PR_BASE}"
          fi
          mvn -B sonar:sonar \
            -Dsonar.qualitygate.wait=true \
            $PR_ARGS \
            --file pom.xml
