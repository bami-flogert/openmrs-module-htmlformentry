name: CI

on:
  pull_request:
    branches:
      - development
      - pre-release
      - acceptatie
      - main

permissions:
  contents: read
  pull-requests: read

env:
  TZ: America/New_York

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 8
        uses: actions/setup-java@v4
        with:
          java-version: '8'
          distribution: 'temurin'
          cache: maven

      - name: Build OMOD
        run: mvn -B package --file pom.xml -DskipTests

  unit-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 8
        uses: actions/setup-java@v4
        with:
          java-version: '8'
          distribution: 'temurin'
          cache: maven

      - name: Run PoC-scope unit tests
        run: mvn -B -pl omod test verify --file pom.xml

      - name: Upload JaCoCo report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: jacoco-report-pr-${{ github.event.pull_request.number }}
          path: omod/target/site/jacoco/
          if-no-files-found: ignore
          retention-days: 14

  dependency-review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/dependency-review-action@v4
