name: CI

on:
  pull_request:
    branches:
      - development
      - pre-release
      - acceptatie
      - main
  push:
    branches:
      - main

permissions:
  contents: read
  pull-requests: read

env:
  TZ: America/New_York

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 8
        uses: actions/setup-java@v4
        with:
          java-version: '8'
          distribution: 'temurin'
          cache: maven

      - name: Build OMOD
        run: mvn -B package --file pom.xml -DskipTests

  unit-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 8
        uses: actions/setup-java@v4
        with:
          java-version: '8'
          distribution: 'temurin'
          cache: maven

      - name: Run PoC-scope unit tests
        run: mvn -B -pl omod test verify --file pom.xml

      - name: Upload JaCoCo report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: jacoco-report-pr-${{ github.event.pull_request.number }}
          path: omod/target/site/jacoco/
          if-no-files-found: ignore
          retention-days: 14

  dependency-review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/dependency-review-action@v4

  zizmor:
    name: zizmor (GitHub Actions security)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # continue-on-error: baseline has open findings; remove after remediation (see docs/zizmor.md)
      - name: Run zizmor
        uses: zizmorcore/zizmor-action@5f14fd08f7cf1cb1609c1e344975f152c7ee938d # v0.5.6
        with:
          advanced-security: false
          annotations: true
        continue-on-error: true

  sonarcloud:
    name: SonarCloud Analysis
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 8
        uses: actions/setup-java@v4
        with:
          java-version: '8'
          distribution: 'temurin'
          cache: maven

      - name: Cache SonarCloud packages
        uses: actions/cache@v4
        with:
          path: ~/.sonar/cache
          key: ${{ runner.os }}-sonar
          restore-keys: ${{ runner.os }}-sonar

      - name: Build and run PoC-scope tests
        run: |
          mvn -B package --file pom.xml -DskipTests
          mvn -B -pl omod test verify --file pom.xml

      - name: Set up JDK 17 for SonarScanner
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: SonarCloud scan
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          PR_ARGS=""
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            PR_ARGS="-Dsonar.pullrequest.key=${{ github.event.pull_request.number }} \
              -Dsonar.pullrequest.branch=${{ github.head_ref }} \
              -Dsonar.pullrequest.base=${{ github.base_ref }}"
          fi
          mvn -B org.sonarsource.scanner.maven:sonar-maven-plugin:sonar \
            -Dsonar.host.url=https://sonarcloud.io \
            -Dsonar.organization=bami-flogert \
            -Dsonar.projectKey=bami-flogert_openmrs-module-htmlformentry \
            -Dsonar.coverage.jacoco.xmlReportPaths=omod/target/site/jacoco/jacoco.xml \
            -Dsonar.exclusions=.github/**,**/target/**,**/*.min.js \
            -Dsonar.qualitygate.wait=true \
            $PR_ARGS \
            --file pom.xml
